# build_config.toml - AJJ3LicenseManager
# Generated by build.py v1.8.6 --init on 2026-06-03.
# Review and edit as needed. Validate with: python build.py . --audit

[app]
name        = "AJJ3LicenseManager"
version     = "1.0.0"
description = "Offline RSA license-key minting for the AJJ3 apps"
author      = "AJJ3"
entry       = "main.py"

[build]
# "yes" | "no" | "auto" (auto = off on Windows+MSVC, on elsewhere)
lto = "auto"

[nuitka]
plugins            = ["pyside6"]
include_qt_plugins = "sensible"

# Add dynamic-import safety nets here if Nuitka misses modules:
include_packages = []
include_modules  = []

# nofollow_imports = exclude modules from the build entirely.
# WARNING: a nofollow'd module is NOT bundled - importing it in
# a standalone build raises ImportError at runtime. Use only for
# modules genuinely not needed at runtime. pymupdf is handled
# automatically (build routes to MinGW64); do NOT list it here.
nofollow_imports = []

# Auto-detected from project: assets
data_dirs        = ["assets"]

data_files       = [
    ["README.md", "README.md"],
]

[icons]
windows = "assets/icon.ico"
macos   = "assets/icon.icns"
